<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel" aria-labelledby="app-title">
        <div class="header">
          <div>
            <p class="eyebrow">Daily tasks</p>
            <h1 id="app-title">To-Do List</h1>
          </div>
          <span class="date" id="today"></span>
        </div>

        <form class="task-form" id="task-form">
          <label class="sr-only" for="task-input">Add a task</label>
          <input
            id="task-input"
            type="text"
            maxlength="80"
            placeholder="Add a new task..."
            autocomplete="off"
            required
          />
          <button type="submit">Add</button>
        </form>

        <div class="toolbar" aria-label="Task filters">
          <button class="filter active" type="button" data-filter="all">All</button>
          <button class="filter" type="button" data-filter="active">Active</button>
          <button class="filter" type="button" data-filter="completed">Done</button>
        </div>

        <ul class="task-list" id="task-list" aria-live="polite"></ul>

        <div class="empty-state" id="empty-state">
          <strong>No tasks here yet.</strong>
          <span>Add one above and start clearing the day.</span>
        </div>

        <footer class="footer">
          <span id="task-count">0 tasks left</span>
          <button class="clear-btn" id="clear-completed" type="button">
            Clear completed
          </button>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
